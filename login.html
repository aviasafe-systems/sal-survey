<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Sign In - SMS Gap Analysis</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/login.css" />

    <!-- Foundation Scripts (Always First) -->
    <script src="js/utils.js"></script>
    <script src="js/credentials.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/translations.js"></script>

    <!-- Page-Specific Script -->
    <script src="js/login.js"></script>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <!-- ===== LOGO ===== -->
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
            </div>

            <!-- ===== TITLE ===== -->
            <h1 id="loginTitle">Welcome Back</h1>
            <p class="subtitle" id="loginSubtitle">Sign in to continue your SMS Gap Analysis journey</p>

            <!-- ===== LANGUAGE TOGGLE ===== -->
            <div class="login-language">
                <button class="lang-toggle-btn" id="langToggle" onclick="toggleLanguage()">🇳🇵 नेपाली</button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)" autocomplete="off">
                <div class="error-message" id="errorMessage">Invalid credentials. Please try again.</div>
                <div class="success-message" id="successMessage">Login successful! Redirecting...</div>

                <div class="form-group">
                    <label for="email" id="emailLabel"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" 
                           autocomplete="off" 
                           autocorrect="off" 
                           autocapitalize="off" 
                           spellcheck="false"
                           required />
                </div>

                <div class="form-group">
                    <label for="password" id="passwordLabel"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter your password" 
                           autocomplete="new-password" 
                           autocorrect="off" 
                           autocapitalize="off" 
                           spellcheck="false"
                           required />
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> <span id="loginBtnText">Sign In</span>
                </button>
            </form>

            <!-- ===== BACK LINK ===== -->
            <a class="back-link" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> <span id="backLinkText">Back to Home</span>
            </a>

            <!-- ===== FEATURES ===== -->
            <div class="features">
                <div class="feature" id="feature1"><i class="fas fa-check-circle"></i> 24 Questions</div>
                <div class="feature" id="feature2"><i class="fas fa-check-circle"></i> 12 SMS Elements</div>
                <div class="feature" id="feature3"><i class="fas fa-check-circle"></i> Progress Tracking</div>
                <div class="feature" id="feature4"><i class="fas fa-check-circle"></i> Gap Analysis</div>
            </div>

            <!-- ===== FOOTER NOTE ===== -->
            <div class="footer-note">
                <i class="fas fa-shield-alt"></i> <span id="footerNote">sms.aviasafesystems.com &bull; Secure &bull; ICAO Annex 19</span>
            </div>
        </div>
    </div>

    <!-- ============================================================
    NO INLINE JAVASCRIPT - All logic is in js/login.js
    The functions toggleLanguage(), handleLogin(), and goBack()
    are defined in js/login.js and referenced by onclick attributes.
    ============================================================ -->

</body>
</html>
